        queue=shuffle(PUZZLES).slice(0,TOTAL_ROUNDS);
        round=0; score=0; roundResults=[];
        document.getElementById('end-screen').style.display='none';
        document.getElementById('game-area').style.display='';
        document.getElementById('action-row')||0;
        document.querySelectorAll('.action-row').forEach(el=>el.style.display='flex');
        updateScoreBar();
        loadRound();
    }

    function updateScoreBar(){
        document.getElementById('score-display').textContent=score;
        document.getElementById('round-display').textContent=`${round+1}/${TOTAL_ROUNDS}`;
    }

    function loadRound(){
        if(round>=TOTAL_ROUNDS){endGame();return;}
        const p=queue[round];
        foundThisRound=[]; hintUsed=0;
        document.getElementById('round-label').textContent=`Round ${round+1} of ${TOTAL_ROUNDS}`;
        document.getElementById('club1-name').textContent=p.c1;
        document.getElementById('club2-name').textContent=p.c2;
        document.getElementById('club1-badge').innerHTML=clubBadge(p.c1);
        document.getElementById('club2-badge').innerHTML=clubBadge(p.c2);
        document.getElementById('player-input').value='';
        document.getElementById('player-input').disabled=false;
        document.getElementById('submit-btn').disabled=false;
        document.getElementById('feedback').textContent='';
        document.getElementById('feedback').className='feedback';
        document.getElementById('hint-text').textContent='';
        document.getElementById('hint-btn').disabled=false;
        document.getElementById('found-section').style.display='none';
        document.getElementById('found-list').innerHTML='';
        document.getElementById('next-btn').style.display='none';
        document.getElementById('skip-btn').style.display='';
        updateScoreBar();
        startTimer();
        document.getElementById('player-input').focus();
    }

    // ─── Timer ───────────────────────────────────────────────────────
    function startTimer(){
        clearInterval(timerRef);
        timerSecs=ROUND_TIME;
        renderTimer();
        timerRef=setInterval(()=>{
            timerSecs--;
            renderTimer();
            if(timerSecs<=0){clearInterval(timerRef);timeUp();}
        },1000);
    }

    function renderTimer(){
        const el=document.getElementById('timer-display');
        el.textContent=timerSecs;
        el.className='score-val timer-val'+(timerSecs<=10?' low':'');
    }

    function timeUp(){
        document.getElementById('player-input').disabled=true;
        document.getElementById('submit-btn').disabled=true;
        document.getElementById('hint-btn').disabled=true;
        const p=queue[round];
        showFeedback(`Time's up! A valid answer: ${p.ans[0]}`,'wrong');
        document.getElementById('next-btn').style.display='';
        document.getElementById('skip-btn').style.display='none';
        if(foundThisRound.length===0){
            roundResults.push({c1:p.c1,c2:p.c2,found:[],pts:0,skipped:false,timeUp:true});
        }
    }

    // ─── Answer submission ───────────────────────────────────────────
    function submitAnswer(){
        const input=document.getElementById('player-input');
        const raw=input.value.trim();
        if(!raw)return;
        const p=queue[round];
        const guess=norm(raw);

        // Check duplicate
        if(foundThisRound.map(f=>norm(f)).some(f=>f===guess)){
            showFeedback('Already found!','duplicate');
            input.select(); return;
        }

        // Check valid
        const valid=p.ans.some(a=>norm(a)===guess||norm(a).includes(guess)||guess.includes(norm(a).split(' ')[1]||norm(a)));
        const canonical=valid?p.ans.find(a=>norm(a)===guess||norm(a).includes(guess)||guess.includes(norm(a).split(' ')[1]||norm(a))):null;

        if(valid&&canonical){
            // Find the full display name (first alias that normalises to canonical)
            const display=p.ans.find(a=>norm(a)===norm(canonical))||canonical;
            const pts=foundThisRound.length===0?20:10;
            score+=pts;
            foundThisRound.push(display);
            showFeedback(`✓ ${display} — +${pts} points!`,'correct');
            renderFound();
            if(!roundResults.find(r=>r.c1===p.c1&&r.c2===p.c2)){
                roundResults.push({c1:p.c1,c2:p.c2,found:[display],pts,skipped:false,timeUp:false});
            } else {
                const r=roundResults.find(r=>r.c1===p.c1&&r.c2===p.c2);
                r.found.push(display); r.pts+=pts;
            }
            updateScoreBar();
            // After 3 found, show next button
            if(foundThisRound.length>=3){
                document.getElementById('next-btn').style.display='';
            }
        } else {
            showFeedback('Not a valid connection — try again!','wrong');
        }
        input.value='';
        input.focus();
    }

    function renderFound(){
        const list=document.getElementById('found-list');
        const sec=document.getElementById('found-section');
        sec.style.display='';
        list.innerHTML=foundThisRound.map((name,i)=>{
            const pts=i===0?20:10;
            return`<div class="found-chip">${name} <span class="chip-pts">+${pts}</span></div>`;
        }).join('');
    }

    function showFeedback(msg,cls){
        const el=document.getElementById('feedback');
        el.textContent=msg;
        el.className='feedback '+cls;
    }

    // ─── Hint ────────────────────────────────────────────────────────
    function useHint(){
        const p=queue[round];
        if(hintUsed>=p.hints.length)return;
        score=Math.max(0,score-5);
        document.getElementById('hint-text').textContent='Hint: '+p.hints[hintUsed];
        hintUsed++;
        if(hintUsed>=p.hints.length)document.getElementById('hint-btn').disabled=true;
        updateScoreBar();
    }

    // ─── Navigation ──────────────────────────────────────────────────
    function skipRound(){
        clearInterval(timerRef);
        const p=queue[round];
        if(!roundResults.find(r=>r.c1===p.c1&&r.c2===p.c2)){
            roundResults.push({c1:p.c1,c2:p.c2,found:foundThisRound.slice(),pts:0,skipped:true,timeUp:false});
        }
        showFeedback(`Skipped — a valid answer: ${p.ans[0]}`,'wrong');
        document.getElementById('player-input').disabled=true;
        document.getElementById('submit-btn').disabled=true;
        document.getElementById('next-btn').style.display='';
        document.getElementById('skip-btn').style.display='none';
    }

    function nextRound(){
        clearInterval(timerRef);
        round++;
        loadRound();
    }

    // ─── End ─────────────────────────────────────────────────────────
    function endGame(){
        clearInterval(timerRef);
        document.getElementById('game-area').style.display='none';
        document.querySelectorAll('.action-row').forEach(el=>el.style.display='none');
        const end=document.getElementById('end-screen');
        end.style.display='block';
        document.getElementById('end-score').textContent=score;
        const max=TOTAL_ROUNDS*20+(TOTAL_ROUNDS-1)*10;
        const pct=score/max;
        let grade;
        if(pct>=.8)grade='🏆 Premier League Expert!';
        else if(pct>=.6)grade='⚽ Championship Quality';
        else if(pct>=.4)grade='💪 League One Standard';
        else grade='📖 Keep studying the game!';
        document.getElementById('end-grade').textContent=grade;

        const rounds=document.getElementById('end-rounds');
        rounds.innerHTML='<div style="font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#666;margin-bottom:12px;">Round by Round</div>'+
            roundResults.map(r=>`<div class="end-round-item"><strong>${r.c1} + ${r.c2}</strong> — ${r.found.length?r.found.join(', '):(r.skipped?'Skipped':'Time up')} ${r.pts?`<span style="color:#8b5cf6;font-weight:700">+${r.pts}pts</span>`:''}</div>`).join('');
    }

    // ─── Keyboard ────────────────────────────────────────────────────
    document.addEventListener('keydown',e=>{
        if(e.key==='Enter'){
            const ni=document.getElementById('next-btn');
            if(ni.style.display!=='none'){nextRound();return;}
            submitAnswer();
        }
    });

    initGame();
    </script>
</body>
</html>
