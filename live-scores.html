    <style>
        html, body {
            background: #0a0a0a;
            color: #f5f5f5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .scores-page {
            max-width: 860px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        /* ─── Page Header ─────────────────────────────── */
        .page-header {
            margin-bottom: 40px;
            padding-bottom: 28px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .page-eyebrow {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #8b5cf6;
            margin: 0 0 12px;
        }

        .page-title {
            font-family: 'Noto Serif', Georgia, serif;
            font-size: 48px;
            font-weight: 700;
            line-height: 1.1;
            color: #f5f5f5;
            margin: 0 0 12px;
            letter-spacing: -0.5px;
        }

        .page-meta {
            font-size: 13px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .refresh-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #666;
        }

        .refresh-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
        }

        .refresh-dot.live {
            animation: pulse-green 1.5s ease-in-out infinite;
        }

        @keyframes pulse-green {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* ─── Section ─────────────────────────────────── */
        .scores-section {
            margin-bottom: 48px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .section-title {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: #888;
            margin: 0;
        }

        .section-divider {
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.06);
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ef4444;
            text-transform: uppercase;
        }

        .live-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse-red 1.2s ease-in-out infinite;
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(239, 68, 68, 0); }
        }

        /* ─── Date Group ──────────────────────────────── */
        .date-group {
            margin-bottom: 24px;
        }

        .date-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: #8b5cf6;
            padding: 6px 12px;
            background: rgba(139, 92, 246, 0.08);
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .match-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* ─── Match Card ──────────────────────────────── */
        .match-card {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        .match-card:hover {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.1);
        }

        .match-card.is-live {
            border-color: rgba(239, 68, 68, 0.2);
            background: rgba(239, 68, 68, 0.03);
        }

        .match-card.is-finished {
            opacity: 0.75;
        }

        /* ─── Team ────────────────────────────────────── */
        .team {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .team.home {
            justify-content: flex-end;
        }

        .team.home .team-name {
            text-align: right;
        }

        .team-logo {
            width: 30px;
            height: 30px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .team.home .team-logo {
            order: 2;
        }

        .team-badge-fallback {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(139, 92, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 700;
            color: #8b5cf6;
            flex-shrink: 0;
            text-transform: uppercase;
        }

        .team.home .team-badge-fallback {
            order: 2;
        }

        .team-name {
            font-size: 14px;
            font-weight: 600;
            color: #e8e8e8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .team-name.winner {
            color: #fff;
        }

        /* ─── Match Center ────────────────────────────── */
        .match-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 90px;
        }

        .match-score {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 22px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: #f5f5f5;
            line-height: 1;
        }

        .score-sep {
            color: #444;
            font-size: 16px;
            font-weight: 400;
        }

        .match-status {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .match-status.live {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.12);
        }

        .match-status.finished {
            color: #666;
            background: rgba(255,255,255,0.04);
        }

        .match-status.upcoming {
            color: #f5f5f5;
            background: rgba(255,255,255,0.06);
        }

        .match-status.halftime {
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.12);
        }

        .match-round {
            font-size: 10px;
            color: #555;
            letter-spacing: 0.3px;
        }

        /* ─── Loading / Empty ─────────────────────────── */
        .loading-state {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 24px 0;
            color: #666;
            font-size: 13px;
        }

        .loading-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            padding: 28px 20px;
            text-align: center;
            color: #555;
            font-size: 14px;
            background: rgba(255,255,255,0.015);
            border-radius: 10px;
            border: 1px dashed rgba(255,255,255,0.06);
        }

        /* ─── Responsive ──────────────────────────────── */
        @media (max-width: 768px) {
            .scores-page {
                padding: 24px 16px 60px;
            }

            .page-title {
                font-size: 32px;
            }

            .match-card {
                padding: 12px 14px;
                gap: 8px;
            }

            .team-name {
                font-size: 13px;
                max-width: 110px;
            }

            .match-score {
                font-size: 18px;
            }

            .match-center {
                min-width: 72px;
            }

            .team-logo, .team-badge-fallback {
                width: 26px;
                height: 26px;
            }
        }

        @media (max-width: 480px) {
            .team-name {
                display: none;
            }

            .team-logo, .team-badge-fallback {
                width: 32px;
                height: 32px;
            }

            .match-center {
                min-width: 64px;
            }

            .match-score {
                font-size: 20px;
            }
        }
    </style>
</head>

    <script>
    (function () {
        // ─── Config ──────────────────────────────────────────────
        const RAPIDAPI_KEY = '015c3572fdmsh9f6f6598e6ec003p1fb385jsn529d908dcb43';
        const DIRECT_KEY = '2108d2f78df78e9e61f4a29878d49581';
        const LEAGUE_ID = 39; // Premier League

        const now = new Date();
        const apiSeason = now.getMonth() >= 7 ? now.getFullYear() : now.getFullYear() - 1;
        const todayStr = now.toISOString().split('T')[0];

        // ─── Team Logos ───────────────────────────────────────────
        const teamLogos = {
            "Arsenal": "https://resources.premierleague.com/premierleague/badges/50/t3.png",
            "Aston Villa": "https://resources.premierleague.com/premierleague/badges/50/t7.png",
            "Bournemouth": "https://resources.premierleague.com/premierleague/badges/50/t91.png",
            "Brentford": "https://resources.premierleague.com/premierleague/badges/50/t94.png",
            "Brighton": "https://resources.premierleague.com/premierleague/badges/50/t36.png",
            "Chelsea": "https://resources.premierleague.com/premierleague/badges/50/t8.png",
            "Crystal Palace": "https://resources.premierleague.com/premierleague/badges/50/t31.png",
            "Everton": "https://resources.premierleague.com/premierleague/badges/50/t11.png",
            "Fulham": "https://resources.premierleague.com/premierleague/badges/50/t54.png",
            "Ipswich": "https://resources.premierleague.com/premierleague/badges/50/t40.png",
            "Leeds": "https://resources.premierleague.com/premierleague/badges/50/t2.png",
            "Leicester": "https://resources.premierleague.com/premierleague/badges/50/t13.png",
            "Liverpool": "https://resources.premierleague.com/premierleague/badges/50/t14.png",
            "Man City": "https://resources.premierleague.com/premierleague/badges/50/t43.png",
            "Man Utd": "https://resources.premierleague.com/premierleague/badges/50/t1.png",
            "Newcastle": "https://resources.premierleague.com/premierleague/badges/50/t4.png",
            "Nott'm Forest": "https://resources.premierleague.com/premierleague/badges/50/t17.png",
            "Southampton": "https://resources.premierleague.com/premierleague/badges/50/t20.png",
            "Spurs": "https://resources.premierleague.com/premierleague/badges/50/t6.png",
            "West Ham": "https://resources.premierleague.com/premierleague/badges/50/t21.png",
            "Wolves": "https://resources.premierleague.com/premierleague/badges/50/t39.png"
        };

        const teamNameMap = {
            "Arsenal": "Arsenal", "Aston Villa": "Aston Villa",
            "AFC Bournemouth": "Bournemouth", "Bournemouth": "Bournemouth",
            "Brentford": "Brentford",
            "Brighton and Hove Albion": "Brighton", "Brighton": "Brighton",
            "Chelsea": "Chelsea", "Crystal Palace": "Crystal Palace",
            "Everton": "Everton", "Fulham": "Fulham",
            "Ipswich Town": "Ipswich", "Ipswich": "Ipswich",
            "Leeds United": "Leeds", "Leeds": "Leeds",
            "Leicester City": "Leicester", "Leicester": "Leicester",
            "Liverpool": "Liverpool",
            "Manchester City": "Man City", "Man City": "Man City",
            "Manchester United": "Man Utd", "Man Utd": "Man Utd",
            "Newcastle United": "Newcastle", "Newcastle": "Newcastle",
            "Nottingham Forest": "Nott'm Forest", "Nott'm Forest": "Nott'm Forest",
            "Southampton": "Southampton",
            "Tottenham Hotspur": "Spurs", "Spurs": "Spurs",
            "West Ham United": "West Ham", "West Ham": "West Ham",
            "Wolverhampton Wanderers": "Wolves", "Wolves": "Wolves"
        };

        // ─── Status helpers ───────────────────────────────────────
        const LIVE_STATUSES = new Set(['1H', 'HT', '2H', 'ET', 'P', 'LIVE', 'INT']);
        const FINISHED_STATUSES = new Set(['FT', 'AET', 'PEN', 'AWD', 'WO']);

        function isLive(status) { return LIVE_STATUSES.has(status); }
        function isFinished(status) { return FINISHED_STATUSES.has(status); }

        function statusLabel(fixture) {
            const s = fixture.fixture.status.short;
            const elapsed = fixture.fixture.status.elapsed;
            if (s === 'HT') return { text: 'HT', cls: 'halftime' };
            if (s === 'FT') return { text: 'FT', cls: 'finished' };
            if (s === 'AET') return { text: 'AET', cls: 'finished' };
            if (s === 'PEN') return { text: 'Pens', cls: 'finished' };
            if (s === 'PST') return { text: 'PPD', cls: 'finished' };
            if (LIVE_STATUSES.has(s)) return { text: `${elapsed || 0}'`, cls: 'live' };
            // Upcoming — format kick-off time
            const d = new Date(fixture.fixture.date);
            const time = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/London' });
            return { text: time, cls: 'upcoming' };
        }

        function normName(name) { return teamNameMap[name] || name; }

        function teamLogo(name) {
            const n = normName(name);
            const url = teamLogos[n];
            if (url) return `<img class="team-logo" src="${url}" alt="${n}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'team-badge-fallback',textContent:'${n.slice(0,3).toUpperCase()}'}))" >`;
            return `<div class="team-badge-fallback">${n.slice(0, 3).toUpperCase()}</div>`;
        }

        function formatMatchDate(dateStr) {
            const d = new Date(dateStr);
            const todayDate = new Date(); todayDate.setHours(0,0,0,0);
            const tomorrowDate = new Date(todayDate); tomorrowDate.setDate(tomorrowDate.getDate()+1);
            const matchDay = new Date(d); matchDay.setHours(0,0,0,0);
            if (+matchDay === +todayDate) return 'Today';
            if (+matchDay === +tomorrowDate) return 'Tomorrow';
            return d.toLocaleDateString('en-GB', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        function renderMatchCard(fixture) {
            const home = normName(fixture.teams.home.name);
            const away = normName(fixture.teams.away.name);
            const homeScore = fixture.goals.home;
            const awayScore = fixture.goals.away;
            const status = fixture.fixture.status.short;
            const { text: statusText, cls: statusCls } = statusLabel(fixture);
            const live = isLive(status);
            const finished = isFinished(status);

            const homeWin = finished && homeScore > awayScore;
            const awayWin = finished && awayScore > homeScore;

            let cardClass = 'match-card';
            if (live) cardClass += ' is-live';
            else if (finished) cardClass += ' is-finished';

            const showScore = live || finished;
            const centerHTML = showScore
                ? `<div class="match-score">
                       <span class="${homeWin ? 'winner' : ''}">${homeScore ?? 0}</span>
                       <span class="score-sep">–</span>
                       <span class="${awayWin ? 'winner' : ''}">${awayScore ?? 0}</span>
                   </div>
                   <span class="match-status ${statusCls}">${statusText}</span>`
                : `<span class="match-status upcoming">${statusText}</span>`;

            return `
                <div class="${cardClass}">
                    <div class="team home">
                        <span class="team-name ${homeWin ? 'winner' : ''}">${home}</span>
                        ${teamLogo(fixture.teams.home.name)}
                    </div>
                    <div class="match-center">
                        ${centerHTML}
                    </div>
                    <div class="team away">
                        ${teamLogo(fixture.teams.away.name)}
                        <span class="team-name ${awayWin ? 'winner' : ''}">${away}</span>
                    </div>
                </div>`;
        }

        // ─── API Fetching ──────────────────────────────────────────
        async function fetchFromAPI(params) {
            const qs = new URLSearchParams(params).toString();

            // Try direct API-Sports first
            try {
                const res = await fetch(`https://v3.football.api-sports.io/fixtures?${qs}`, {
                    headers: { 'x-apisports-key': DIRECT_KEY }
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.response && data.response.length >= 0) return data.response;
                }
            } catch (e) { /* fall through */ }

            // Fallback: RapidAPI
            try {
                const res = await fetch(`https://api-football-v1.p.rapidapi.com/v3/fixtures?${qs}`, {
                    headers: {
                        'x-rapidapi-host': 'api-football-v1.p.rapidapi.com',
                        'x-rapidapi-key': RAPIDAPI_KEY
                    }
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.response) return data.response;
                }
            } catch (e) { /* fall through */ }

            return null;
        }

        // ─── Render Sections ──────────────────────────────────────
        function renderLiveSection(liveMatches) {
            const section = document.getElementById('live-section');
            const container = document.getElementById('live-container');

            if (!liveMatches || liveMatches.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            container.innerHTML = liveMatches.map(renderMatchCard).join('');
        }

        function renderTodaySection(todayMatches) {
            const container = document.getElementById('today-container');
            const label = document.getElementById('today-label');
            const today = new Date();
            label.textContent = today.toLocaleDateString('en-GB', { weekday: 'long', month: 'long', day: 'numeric' });

            if (!todayMatches || todayMatches.length === 0) {
                container.innerHTML = '<div class="empty-state">No Premier League matches today</div>';
                return;
            }

            container.innerHTML = todayMatches.map(renderMatchCard).join('');
        }

        function renderUpcomingSection(upcoming) {
            const container = document.getElementById('upcoming-container');

            if (!upcoming || upcoming.length === 0) {
                container.innerHTML = '<div class="empty-state">No upcoming fixtures available</div>';
                return;
            }

            // Group by date
            const grouped = {};
            upcoming.forEach(f => {
                const dateKey = f.fixture.date.split('T')[0];
                if (!grouped[dateKey]) grouped[dateKey] = [];
                grouped[dateKey].push(f);
            });

            let html = '';
            for (const dateKey of Object.keys(grouped).sort()) {
                const label = formatMatchDate(new Date(dateKey).toISOString());
                html += `<div class="date-group">
                    <span class="date-label">${label}</span>
                    <div class="match-list">
                        ${grouped[dateKey].map(renderMatchCard).join('')}
                    </div>
                </div>`;
            }

            container.innerHTML = html;
        }

        function updateRefreshLabel(hasLive) {
            const dot = document.getElementById('refresh-dot');
            const lbl = document.getElementById('refresh-label');
            const t = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            if (hasLive) {
                dot.classList.add('live');
                lbl.textContent = `Live · Refreshes every 60s · Last updated ${t}`;
            } else {
                dot.classList.remove('live');
                dot.style.background = '#8b5cf6';
                lbl.textContent = `Last updated ${t}`;
            }
        }

        // ─── Main Load ────────────────────────────────────────────
        async function loadScores() {
            const [todayFixtures, upcomingFixtures] = await Promise.all([
                fetchFromAPI({ league: LEAGUE_ID, season: apiSeason, date: todayStr }),
                fetchFromAPI({ league: LEAGUE_ID, season: apiSeason, next: 15 })
            ]);

            // Split today into live / other
            let liveMatches = [];
            let todayAll = todayFixtures || [];

            liveMatches = todayAll.filter(f => isLive(f.fixture.status.short));

            renderLiveSection(liveMatches);
            renderTodaySection(todayAll);

            // Filter upcoming to exclude today (already shown above)
            const upcoming = (upcomingFixtures || []).filter(f => {
                const d = f.fixture.date.split('T')[0];
                return d !== todayStr;
            });
            renderUpcomingSection(upcoming);

            updateRefreshLabel(liveMatches.length > 0);
        }

        // ─── Live Refresh ─────────────────────────────────────────
        let refreshInterval = null;

        async function refreshLive() {
            const liveData = await fetchFromAPI({ league: LEAGUE_ID, season: apiSeason, live: 'all' });
            if (!liveData) return;
            renderLiveSection(liveData);
            updateRefreshLabel(liveData.length > 0);

            if (liveData.length === 0 && refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
        }

        // Initial load
        loadScores().then(() => {
            const liveSection = document.getElementById('live-section');
            if (liveSection.style.display !== 'none') {
                refreshInterval = setInterval(refreshLive, 60000);
            }
        });

        // Re-check for live matches every 5 minutes even if none active
        setInterval(() => {
            if (!refreshInterval) {
                loadScores().then(() => {
                    if (document.getElementById('live-section').style.display !== 'none') {
                        refreshInterval = setInterval(refreshLive, 60000);
                    }
                });
            }
        }, 5 * 60 * 1000);
    })();
    </script>
</body>
</html>
