<!DOCTYPE html>
<html lang="en-GB">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TVPLGM5QY9"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-TVPLGM5QY9');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Live Premier League scores, today's results and upcoming fixtures — updated in real time.">
    <title>Live Scores | Premier League 2025/26 | EPL News Hub</title>
    <link rel="canonical" href="https://eplnewshub.com/live-scores.html">
    <link rel="stylesheet" href="/styles.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6480210605786899" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/eplnewshubnewlogo.png">
    <style>
        html,body{background:#0a0a0a;color:#f5f5f5;font-family:'Inter',-apple-system,sans-serif;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
        .page{max-width:860px;margin:0 auto;padding:48px 24px 80px;}
        .page-eyebrow{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8b5cf6;margin:0 0 12px;}
        .page-title{font-family:'Noto Serif',Georgia,serif;font-size:48px;font-weight:700;line-height:1.1;color:#f5f5f5;margin:0 0 12px;letter-spacing:-0.5px;}
        .page-meta{font-size:13px;color:#666;margin:0 0 36px;padding-bottom:24px;border-bottom:1px solid rgba(255,255,255,0.06);}
        .refresh-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#10b981;margin-right:6px;vertical-align:middle;}
        .refresh-dot.live{animation:pulse 1.4s ease-in-out infinite;}
        @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(16,185,129,.4);}50%{opacity:.7;box-shadow:0 0 0 5px rgba(16,185,129,0);}}

        .section{margin-bottom:44px;}
        .section-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
        .section-label{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#888;margin:0;}
        .section-line{flex:1;height:1px;background:rgba(255,255,255,.06);}
        .live-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.5px;color:#ef4444;text-transform:uppercase;}
        .live-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;animation:red-pulse 1.2s ease-in-out infinite;}
        @keyframes red-pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(239,68,68,.5);}50%{opacity:.7;box-shadow:0 0 0 5px rgba(239,68,68,0);}}

        .date-group{margin-bottom:22px;}
        .date-label{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#8b5cf6;background:rgba(139,92,246,.08);padding:5px 12px;border-radius:6px;margin-bottom:10px;}
        .match-list{display:flex;flex-direction:column;gap:6px;}

        .match-card{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;padding:14px 20px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:10px;transition:border-color .2s,background .2s;}
        .match-card:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);}
        .match-card.is-live{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.04);}
        .match-card.is-finished{opacity:.75;}

        .team{display:flex;align-items:center;gap:10px;}
        .team.home{justify-content:flex-end;}
        .team.home .team-name{text-align:right;}
        .team-logo{width:30px;height:30px;object-fit:contain;flex-shrink:0;}
        .team.home .team-logo{order:2;}
        .team-fallback{width:30px;height:30px;border-radius:50%;background:rgba(139,92,246,.2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#8b5cf6;flex-shrink:0;text-transform:uppercase;}
        .team.home .team-fallback{order:2;}
        .team-name{font-size:14px;font-weight:600;color:#e8e8e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:145px;}
        .team-name.winner{color:#fff;}

        .match-center{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:90px;}
        .match-score{display:flex;align-items:center;gap:8px;font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;color:#f5f5f5;line-height:1;}
        .score-sep{color:#444;font-size:16px;font-weight:400;}
        .match-status{font-size:11px;font-weight:600;letter-spacing:.4px;padding:2px 8px;border-radius:4px;}
        .status-live{color:#ef4444;background:rgba(239,68,68,.12);}
        .status-ft{color:#666;background:rgba(255,255,255,.05);}
        .status-pre{color:#f5f5f5;background:rgba(255,255,255,.07);}
        .status-ht{color:#f59e0b;background:rgba(245,158,11,.12);}

        .loading-state{display:flex;align-items:center;gap:12px;padding:32px 0;color:#666;font-size:14px;}
        .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.1);border-top-color:#8b5cf6;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .empty-state{padding:28px;text-align:center;color:#555;font-size:14px;background:rgba(255,255,255,.015);border-radius:10px;border:1px dashed rgba(255,255,255,.06);}

        @media(max-width:768px){
            .page{padding:24px 16px 60px;}
            .page-title{font-size:32px;}
            .match-card{padding:12px 14px;gap:8px;}
            .team-name{font-size:13px;max-width:105px;}
            .match-score{font-size:18px;}
            .match-center{min-width:72px;}
            .team-logo,.team-fallback{width:26px;height:26px;}
        }
        @media(max-width:480px){
            .team-name{display:none;}
            .team-logo,.team-fallback{width:32px;height:32px;}
        }
    </style>
</head>
<body>
    <div class="header" include="./header.html"></div>
    <main class="page">
        <p class="page-eyebrow">Premier League · 2025/26</p>
        <h1 class="page-title">Live Scores</h1>
        <p class="page-meta"><span class="refresh-dot" id="rdot"></span><span id="meta-text">Loading...</span></p>

        <section class="section" id="live-section" style="display:none">
            <div class="section-header"><div class="live-badge"><span class="live-dot"></span>Live Now</div><div class="section-line"></div></div>
            <div class="match-list" id="live-container"></div>
        </section>

        <section class="section" id="today-section">
            <div class="section-header"><h2 class="section-label" id="today-lbl">Today</h2><div class="section-line"></div></div>
            <div class="match-list" id="today-container"><div class="loading-state"><div class="spinner"></div>Loading...</div></div>
        </section>

        <section class="section" id="upcoming-section">
            <div class="section-header"><h2 class="section-label">Upcoming Fixtures</h2><div class="section-line"></div></div>
            <div id="upcoming-container"><div class="loading-state"><div class="spinner"></div>Loading...</div></div>
        </section>
    </main>
    <div class="footer" include="./footer.html"></div>
    <script src="/index.js"></script>
    <script>
    (function(){
        const BASE = 'https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard';

        function espnDate(d){ return d.toISOString().slice(0,10).replace(/-/g,''); }

        function parseEvent(ev){
            const comp = ev.competitions[0];
            const home = comp.competitors.find(c=>c.homeAway==='home');
            const away = comp.competitors.find(c=>c.homeAway==='away');
            const st = ev.status.type;
            return {
                id: ev.id,
                date: ev.date,
                homeName: home.team.shortDisplayName || home.team.displayName,
                homeLogo: home.team.logo || '',
                homeScore: home.score || '0',
                homeWin: home.winner,
                awayName: away.team.shortDisplayName || away.team.displayName,
                awayLogo: away.team.logo || '',
                awayScore: away.score || '0',
                awayWin: away.winner,
                state: st.state,          // "pre" | "in" | "post"
                detail: st.shortDetail || st.detail || '',  // "FT", "HT", "35'", "12:30"
                completed: st.completed
            };
        }

        function teamImg(logo, name){
            if(logo) return `<img class="team-logo" src="${logo}" alt="${name}" loading="lazy" onerror="this.style.display='none'">`;
            return `<div class="team-fallback">${name.slice(0,3).toUpperCase()}</div>`;
        }

        function statusEl(ev){
            if(ev.state==='in'){
                const txt = ev.detail || 'LIVE';
                const cls = txt.toUpperCase()==='HT' ? 'status-ht' : 'status-live';
                return `<div class="match-status ${cls}">${txt}</div>`;
            }
            if(ev.state==='post') return `<div class="match-status status-ft">${ev.detail||'FT'}</div>`;
            // pre — format kick-off time
            const d = new Date(ev.date);
            const t = d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'});
            return `<div class="match-status status-pre">${t}</div>`;
        }

        function card(ev){
            const showScore = ev.state!=='pre';
            const center = showScore
                ? `<div class="match-score">
                       <span class="${ev.homeWin?'winner':''}">${ev.homeScore}</span>
                       <span class="score-sep">–</span>
                       <span class="${ev.awayWin?'winner':''}">${ev.awayScore}</span>
                   </div>${statusEl(ev)}`
                : statusEl(ev);
            return `<div class="match-card${ev.state==='in'?' is-live':ev.state==='post'?' is-finished':''}">
                <div class="team home">
                    <span class="team-name${ev.homeWin?' winner':''}">${ev.homeName}</span>
                    ${teamImg(ev.homeLogo,ev.homeName)}
                </div>
                <div class="match-center">${center}</div>
                <div class="team away">
                    ${teamImg(ev.awayLogo,ev.awayName)}
                    <span class="team-name${ev.awayWin?' winner':''}">${ev.awayName}</span>
                </div>
            </div>`;
        }

        function groupByDate(events){
            const g={};
            events.forEach(ev=>{
                const k=ev.date.slice(0,10);
                (g[k]=g[k]||[]).push(ev);
            });
            return g;
        }

        function fmtDateLabel(isoDate){
            const d = new Date(isoDate+'T12:00:00Z');
            const now = new Date(); now.setHours(0,0,0,0);
            const match = new Date(d); match.setHours(0,0,0,0);
            const diff = Math.round((match-now)/(1000*60*60*24));
            if(diff===0) return 'Today';
            if(diff===1) return 'Tomorrow';
            return d.toLocaleDateString('en-GB',{weekday:'short',month:'short',day:'numeric'});
        }

        function renderGroups(events, container){
            if(!events.length){ container.innerHTML='<div class="empty-state">No matches found</div>'; return; }
            const grouped = groupByDate(events);
            let html='';
            for(const k of Object.keys(grouped).sort()){
                html+=`<div class="date-group"><span class="date-label">${fmtDateLabel(k)}</span>
                    <div class="match-list">${grouped[k].map(card).join('')}</div></div>`;
            }
            container.innerHTML=html;
        }

        async function fetchDate(dateStr){
            const res = await fetch(`${BASE}?dates=${dateStr}`);
            if(!res.ok) return [];
            const data = await res.json();
            return (data.events||[]).map(parseEvent);
        }

        async function load(){
            const today = new Date();
            const todayStr = espnDate(today);

            // Fetch today's matches
            const todayEvents = await fetchDate(todayStr);
            const live = todayEvents.filter(e=>e.state==='in');
            const todayAll = todayEvents;

            // Live section
            const liveSection = document.getElementById('live-section');
            if(live.length>0){
                liveSection.style.display='';
                document.getElementById('live-container').innerHTML=live.map(card).join('');
            } else {
                liveSection.style.display='none';
            }

            // Today section
            const todayLbl = document.getElementById('today-lbl');
            todayLbl.textContent = today.toLocaleDateString('en-GB',{weekday:'long',month:'long',day:'numeric'});
            const todayCon = document.getElementById('today-container');
            if(todayAll.length===0){
                todayCon.innerHTML='<div class="empty-state">No Premier League matches today</div>';
            } else {
                todayCon.innerHTML='<div class="match-list">'+todayAll.map(card).join('')+'</div>';
            }

            // Upcoming: next 14 days in parallel
            const futureDates=[];
            for(let i=1;i<=14;i++){
                const d=new Date(today); d.setDate(d.getDate()+i);
                futureDates.push(espnDate(d));
            }
            const futureResults = await Promise.all(futureDates.map(fetchDate));
            const upcoming = futureResults.flat().filter(e=>e.state==='pre');

            renderGroups(upcoming, document.getElementById('upcoming-container'));

            // Meta
            const hasLive = live.length>0;
            const dot = document.getElementById('rdot');
            dot.className = 'refresh-dot'+(hasLive?' live':'');
            dot.style.background = hasLive?'#ef4444':'#10b981';
            const t = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
            document.getElementById('meta-text').textContent = hasLive
                ? `${live.length} match${live.length>1?'es':''} live · Auto-refreshes every 60s · ${t}`
                : `Updated ${t} · Checks for live matches every 5 min`;
        }

        // Live refresh
        let liveTimer = null;
        async function refreshLive(){
            const todayStr = espnDate(new Date());
            const events = await fetchDate(todayStr);
            const live = events.filter(e=>e.state==='in');
            const liveSection = document.getElementById('live-section');
            if(live.length>0){
                liveSection.style.display='';
                document.getElementById('live-container').innerHTML=live.map(card).join('');
                // Also update today to show current scores
                document.getElementById('today-container').innerHTML='<div class="match-list">'+events.map(card).join('')+'</div>';
                const t=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
                document.getElementById('meta-text').textContent=`${live.length} match${live.length>1?'es':''} live · Auto-refreshes every 60s · ${t}`;
            } else {
                liveSection.style.display='none';
                if(liveTimer){ clearInterval(liveTimer); liveTimer=null; }
            }
        }

        load().then(()=>{
            const liveSection = document.getElementById('live-section');
            if(liveSection.style.display!=='none'){
                liveTimer = setInterval(refreshLive, 60000);
            }
        });

        // Re-check every 5 min even if no live matches
        setInterval(()=>{
            if(!liveTimer) load();
        }, 5*60*1000);
    })();
    </script>
</body>
</html>
