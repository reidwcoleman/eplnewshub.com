<!-- Premier League Standings Widget -->
<div class="standings-widget">
    <div class="widget-header">
        <h2 class="widget-title">Premier League Standings</h2>
        <span class="widget-updated" id="standings-updated"></span>
    </div>
    <div class="standings-container" id="standings-container">
        <div class="loading-state">
            <div class="loading-spinner"></div>
            <p>Loading standings...</p>
        </div>
    </div>
</div>

<style>
    .standings-widget {
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 32px;
        margin: 64px 0;
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .widget-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 2px solid rgba(255,255,255,0.08);
    }
    .widget-title {
        font-family: 'Noto Serif', Georgia, serif;
        font-size: 24px;
        font-weight: 700;
        color: #f5f5f5;
        margin: 0;
    }
    .widget-updated {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        color: #555;
    }
    .standings-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .loading-state {
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; padding: 48px 0; gap: 16px;
    }
    .loading-spinner {
        width: 40px; height: 40px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top: 3px solid #8b5cf6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { font-family: 'Inter', sans-serif; font-size: 14px; color: #888888; }
    .no-matches { text-align: center; padding: 48px 20px; color: #888; font-family: 'Inter', sans-serif; font-size: 14px; }
    .standings-table { width: 100%; border-collapse: collapse; font-family: 'Inter', sans-serif; font-size: 14px; }
    .standings-table thead { background: rgba(255,255,255,0.04); border-bottom: 2px solid rgba(255,255,255,0.08); }
    .standings-table th {
        padding: 12px 8px; text-align: center;
        font-weight: 700; font-size: 11px; letter-spacing: 0.5px;
        text-transform: uppercase; color: #888888;
    }
    .standings-table th:nth-child(2) { text-align: left; }
    .standings-table td { padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); text-align: center; }
    .standings-table tbody tr:hover { background: rgba(255,255,255,0.04); }
    .standings-rank { font-weight: 700; color: #f5f5f5; }
    .standings-team { display: flex; align-items: center; gap: 10px; font-weight: 600; color: #f5f5f5; text-align: left; }
    .team-badge { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; }
    .standings-stat { color: #888888; font-variant-numeric: tabular-nums; }
    .standings-points { font-weight: 700; color: #f5f5f5; font-size: 15px; }
    .form-indicator { display: flex; gap: 2px; justify-content: center; }
    .form-dot { width: 6px; height: 6px; border-radius: 50%; }
    .form-dot.W { background: #10b981; }
    .form-dot.D { background: #f59e0b; }
    .form-dot.L { background: #ef4444; }
    .champions-league { border-left: 3px solid #0066cc; }
    .europa-league    { border-left: 3px solid #ff6600; }
    .relegation       { border-left: 3px solid #dc2626; }

    @media (max-width: 768px) {
        .standings-widget { padding: 24px 16px; margin: 40px -20px; border-left: none; border-right: none; border-radius: 0; }
        .standings-table { font-size: 12px; }
        .standings-table th, .standings-table td { padding: 8px 4px; }
        .team-badge { width: 18px; height: 18px; }
        .standings-team { gap: 6px; font-size: 12px; }
        .hide-mobile { display: none; }
        .widget-title { font-size: 18px; }
    }
    @media (max-width: 480px) {
        .standings-widget { padding: 20px 12px; margin: 32px -12px; }
        .standings-table { font-size: 11px; }
        .standings-points { font-size: 13px; }
    }
</style>

<script>
(function () {
    const ESPN_URL = 'https://site.api.espn.com/apis/v2/sports/soccer/eng.1/standings';
    const TSDB_URL = 'https://www.thesportsdb.com/api/v1/json/3/lookuptable.php?l=4328&s=2025-2026';

    function stat(entry, name) {
        const s = (entry.stats || []).find(s => s.name === name);
        return s ? (s.value ?? s.displayValue ?? 0) : 0;
    }

    function formDots(formStr) {
        if (!formStr) return '';
        const results = formStr.replace(/[^WDL]/gi, '').toUpperCase().slice(0, 5).split('');
        return '<div class="form-indicator">' +
            results.map(r => `<span class="form-dot ${r}"></span>`).join('') +
            '</div>';
    }

    function renderTable(rows) {
        const container = document.getElementById('standings-container');
        if (!rows || rows.length === 0) {
            container.innerHTML = '<div class="no-matches">No standings data available.</div>';
            return;
        }

        let html = `<table class="standings-table"><thead><tr>
            <th>#</th><th style="text-align:left">Team</th>
            <th class="hide-mobile">P</th><th class="hide-mobile">W</th>
            <th class="hide-mobile">D</th><th class="hide-mobile">L</th>
            <th>GD</th><th>Pts</th><th class="hide-mobile">Form</th>
        </tr></thead><tbody>`;

        rows.forEach((row, i) => {
            const rank = i + 1;
            let cls = '';
            if (rank <= 4) cls = 'champions-league';
            else if (rank === 5) cls = 'europa-league';
            else if (rank >= 18) cls = 'relegation';

            const gd = row.gd > 0 ? '+' + row.gd : row.gd;
            html += `<tr class="${cls}">
                <td class="standings-rank">${rank}</td>
                <td><div class="standings-team">
                    <img src="${row.logo}" alt="${row.name}" class="team-badge" onerror="this.style.display='none'">
                    <span>${row.name}</span>
                </div></td>
                <td class="standings-stat hide-mobile">${row.played}</td>
                <td class="standings-stat hide-mobile">${row.won}</td>
                <td class="standings-stat hide-mobile">${row.drawn}</td>
                <td class="standings-stat hide-mobile">${row.lost}</td>
                <td class="standings-stat">${gd}</td>
                <td class="standings-points">${row.points}</td>
                <td class="hide-mobile">${formDots(row.form)}</td>
            </tr>`;
        });

        html += '</tbody></table>';
        container.innerHTML = html;
        document.getElementById('standings-updated').textContent =
            'Updated ' + new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }

    async function fetchESPN() {
        const res = await fetch(ESPN_URL);
        if (!res.ok) throw new Error('ESPN ' + res.status);
        const data = await res.json();
        const entries = data.children[0].standings.entries;
        return entries.map((entry, i) => ({
            name: entry.team.displayName,
            logo: (entry.team.logos && entry.team.logos[0]) ? entry.team.logos[0].href : '',
            played: stat(entry, 'gamesPlayed'),
            won: stat(entry, 'wins'),
            drawn: stat(entry, 'ties'),
            lost: stat(entry, 'losses'),
            gf: stat(entry, 'pointsFor'),
            ga: stat(entry, 'pointsAgainst'),
            gd: stat(entry, 'pointDifferential'),
            points: stat(entry, 'points'),
            form: (entry.stats.find(s => s.name === 'streak') || {}).displayValue || ''
        }));
    }

    async function fetchTSDB() {
        const res = await fetch(TSDB_URL);
        if (!res.ok) throw new Error('TSDB ' + res.status);
        const data = await res.json();
        const table = data.table || [];
        return table.map(team => ({
            name: team.strTeam,
            logo: (team.strBadge || '').replace('/tiny', '/preview'),
            played: parseInt(team.intPlayed) || 0,
            won: parseInt(team.intWin) || 0,
            drawn: parseInt(team.intDraw) || 0,
            lost: parseInt(team.intLoss) || 0,
            gf: parseInt(team.intGoalsFor) || 0,
            ga: parseInt(team.intGoalsAgainst) || 0,
            gd: parseInt(team.intGoalDifference) || 0,
            points: parseInt(team.intPoints) || 0,
            form: team.strForm || ''
        }));
    }

    async function load() {
        try {
            const rows = await fetchESPN();
            renderTable(rows);
        } catch (e) {
            console.warn('[Standings] ESPN failed, trying TSDB:', e.message);
            try {
                const rows = await fetchTSDB();
                renderTable(rows);
            } catch (e2) {
                document.getElementById('standings-container').innerHTML =
                    '<div class="no-matches">Unable to load standings right now.</div>';
            }
        }
    }

    load();
    setInterval(load, 5 * 60 * 1000); // refresh every 5 min
})();
</script>
