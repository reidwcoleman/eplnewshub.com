<!DOCTYPE html>
<html lang="en-GB">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TVPLGM5QY9"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-TVPLGM5QY9');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Premier League fixtures 2025/26 — upcoming matches, results and kick-off times.">
    <title>Premier League Fixtures 2025/26 | EPL News Hub</title>
    <link rel="canonical" href="https://eplnewshub.com/epl_fixtures.html">
    <link rel="stylesheet" href="/styles.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6480210605786899" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/eplnewshubnewlogo.png">
    <style>
        html,body{background:#0a0a0a;color:#f5f5f5;font-family:'Inter',-apple-system,sans-serif;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
        .page{max-width:860px;margin:0 auto;padding:48px 24px 80px;}
        .page-eyebrow{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8b5cf6;margin:0 0 12px;}
        .page-title{font-family:'Noto Serif',Georgia,serif;font-size:48px;font-weight:700;line-height:1.1;color:#f5f5f5;margin:0 0 12px;letter-spacing:-0.5px;}
        .page-meta{font-size:13px;color:#666;margin:0 0 32px;padding-bottom:28px;border-bottom:1px solid rgba(255,255,255,0.06);}

        /* Gameweek filter */
        .gw-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px;}
        .gw-btn{padding:6px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:#888;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;}
        .gw-btn:hover,.gw-btn.active{background:#8b5cf6;border-color:#8b5cf6;color:#fff;}

        /* Section */
        .section{margin-bottom:40px;}
        .section-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
        .section-label{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#888;margin:0;}
        .section-line{flex:1;height:1px;background:rgba(255,255,255,0.06);}
        .date-group{margin-bottom:24px;}
        .date-label{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#8b5cf6;background:rgba(139,92,246,.08);padding:5px 12px;border-radius:6px;margin-bottom:10px;}
        .match-list{display:flex;flex-direction:column;gap:6px;}

        /* Match card */
        .match-card{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;padding:14px 20px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:10px;transition:border-color .2s,background .2s;}
        .match-card:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);}
        .match-card.is-live{border-color:rgba(239,68,68,.2);background:rgba(239,68,68,.03);}
        .match-card.is-finished{opacity:.75;}
        .team{display:flex;align-items:center;gap:10px;}
        .team.home{justify-content:flex-end;}
        .team.home .team-name{text-align:right;}
        .team-logo{width:28px;height:28px;object-fit:contain;flex-shrink:0;}
        .team.home .team-logo{order:2;}
        .team-fallback{width:28px;height:28px;border-radius:50%;background:rgba(139,92,246,.2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#8b5cf6;flex-shrink:0;text-transform:uppercase;}
        .team.home .team-fallback{order:2;}
        .team-name{font-size:14px;font-weight:600;color:#e8e8e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
        .team-name.winner{color:#fff;}
        .match-center{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:88px;}
        .match-score{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;color:#f5f5f5;line-height:1;}
        .score-sep{color:#444;font-size:15px;font-weight:400;}
        .match-status{font-size:11px;font-weight:600;letter-spacing:.4px;padding:2px 8px;border-radius:4px;}
        .match-status.live{color:#ef4444;background:rgba(239,68,68,.12);}
        .match-status.finished{color:#666;background:rgba(255,255,255,.04);}
        .match-status.upcoming{color:#f5f5f5;background:rgba(255,255,255,.07);}
        .match-status.halftime{color:#f59e0b;background:rgba(245,158,11,.12);}
        .live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#ef4444;animation:blink 1.2s infinite;vertical-align:middle;margin-right:3px;}
        @keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

        .loading-state{display:flex;align-items:center;gap:12px;padding:40px 0;color:#666;font-size:14px;}
        .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.1);border-top-color:#8b5cf6;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .empty-state{padding:32px;text-align:center;color:#555;font-size:14px;background:rgba(255,255,255,.015);border-radius:10px;border:1px dashed rgba(255,255,255,.06);}

        @media(max-width:768px){
            .page{padding:24px 16px 60px;}
            .page-title{font-size:32px;}
            .match-card{padding:12px 14px;gap:8px;}
            .team-name{font-size:13px;max-width:105px;}
            .match-score{font-size:17px;}
            .match-center{min-width:72px;}
            .team-logo,.team-fallback{width:24px;height:24px;}
        }
        @media(max-width:480px){
            .team-name{display:none;}
            .team-logo,.team-fallback{width:32px;height:32px;}
            .match-center{min-width:64px;}
        }
    </style>
</head>
<body>
    <div class="header" include="./header.html"></div>

    <main class="page">
        <p class="page-eyebrow">Premier League · 2025/26</p>
        <h1 class="page-title">Fixtures &amp; Results</h1>
        <p class="page-meta" id="page-meta">Loading...</p>

        <section class="section" id="results-section" style="display:none">
            <div class="section-header"><h2 class="section-label">Recent Results</h2><div class="section-line"></div></div>
            <div id="results-container"><div class="loading-state"><div class="spinner"></div>Loading results...</div></div>
        </section>

        <section class="section" id="upcoming-section">
            <div class="section-header"><h2 class="section-label">Upcoming Fixtures</h2><div class="section-line"></div></div>
            <div id="upcoming-container"><div class="loading-state"><div class="spinner"></div>Loading fixtures...</div></div>
        </section>
    </main>

    <div class="footer" include="./footer.html"></div>
    <script src="/index.js"></script>
    <script>
    (function(){
        const ESPN = 'https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard';

        function dateStr(offset){
            const d = new Date();
            d.setDate(d.getDate() + offset);
            return d.toISOString().slice(0,10).replace(/-/g,'');
        }

        function isoToKey(iso){ return iso.slice(0,10); }

        const todayKey = new Date().toISOString().slice(0,10);

        function fmtKey(key){
            if(key === todayKey) return 'Today';
            const tom = new Date(todayKey);
            tom.setDate(tom.getDate()+1);
            if(key === tom.toISOString().slice(0,10)) return 'Tomorrow';
            return new Date(key+'T12:00:00Z').toLocaleDateString('en-GB',{weekday:'short',month:'short',day:'numeric'});
        }

        function parseEvent(ev){
            const comp = ev.competitions[0];
            const home = comp.competitors.find(c=>c.homeAway==='home');
            const away = comp.competitors.find(c=>c.homeAway==='away');
            const st = ev.status.type;
            const d = new Date(ev.date);
            const time = d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'});
            return {
                dateKey: isoToKey(ev.date),
                homeName: home.team.displayName,
                homeLogo: home.team.logo || '',
                homeScore: home.score || '0',
                homeWin: home.winner === true,
                awayName: away.team.displayName,
                awayLogo: away.team.logo || '',
                awayScore: away.score || '0',
                awayWin: away.winner === true,
                state: st.state,        // pre / in / post
                detail: st.shortDetail || st.detail || time,
                completed: st.completed,
                time
            };
        }

        function teamEl(name, logo, side, isWinner){
            const img = logo
                ? `<img class="team-logo" src="${logo}" alt="${name}" loading="lazy" onerror="this.style.display='none'">`
                : `<div class="team-fallback">${name.slice(0,3).toUpperCase()}</div>`;
            const nameEl = `<span class="team-name${isWinner?' winner':''}">${name}</span>`;
            return side === 'home'
                ? `<div class="team home">${nameEl}${img}</div>`
                : `<div class="team away">${img}${nameEl}</div>`;
        }

        function card(ev){
            const live = ev.state === 'in';
            const fin  = ev.state === 'post';
            const showScore = live || fin;

            let statusCls = 'upcoming', statusTxt = ev.time;
            if(ev.detail === 'HT') { statusCls='halftime'; statusTxt='HT'; }
            else if(fin)           { statusCls='finished'; statusTxt='FT'; }
            else if(live)          { statusCls='live'; statusTxt=ev.detail; }

            const liveEl = live ? '<span class="live-dot"></span>' : '';
            const center = showScore
                ? `<div class="match-score">
                       <span class="${ev.homeWin?'winner':''}">${ev.homeScore}</span>
                       <span class="score-sep">–</span>
                       <span class="${ev.awayWin?'winner':''}">${ev.awayScore}</span>
                   </div>
                   <span class="match-status ${statusCls}">${liveEl}${statusTxt}</span>`
                : `<span class="match-status upcoming">${statusTxt}</span>`;

            return `<div class="match-card${live?' is-live':fin?' is-finished':''}">
                ${teamEl(ev.homeName, ev.homeLogo, 'home', ev.homeWin)}
                <div class="match-center">${center}</div>
                ${teamEl(ev.awayName, ev.awayLogo, 'away', ev.awayWin)}
            </div>`;
        }

        function renderGroups(groups, container, sortAsc){
            const keys = Object.keys(groups).sort();
            if(!sortAsc) keys.reverse();
            let html = '';
            keys.forEach(k => {
                html += `<div class="date-group">
                    <span class="date-label">${fmtKey(k)}</span>
                    <div class="match-list">${groups[k].map(card).join('')}</div>
                </div>`;
            });
            container.innerHTML = html || '<div class="empty-state">No fixtures found</div>';
        }

        async function fetchDate(yyyymmdd){
            try {
                const r = await fetch(`${ESPN}?dates=${yyyymmdd}`);
                if(!r.ok) return [];
                const data = await r.json();
                return (data.events || []).map(parseEvent);
            } catch(e){ return []; }
        }

        async function load(){
            // Fetch past 14 days + next 28 days in parallel
            const offsets = [];
            for(let i=-14;i<=28;i++) offsets.push(i);
            const results = await Promise.all(offsets.map(o => fetchDate(dateStr(o))));
            const all = results.flat();

            const pastGroups = {}, futureGroups = {};
            all.forEach(ev => {
                if(ev.state === 'post'){
                    (pastGroups[ev.dateKey] = pastGroups[ev.dateKey]||[]).push(ev);
                } else {
                    (futureGroups[ev.dateKey] = futureGroups[ev.dateKey]||[]).push(ev);
                }
            });

            const recentSec = document.getElementById('results-section');
            const recentCon = document.getElementById('results-container');
            if(Object.keys(pastGroups).length > 0){
                recentSec.style.display = '';
                renderGroups(pastGroups, recentCon, false); // newest first
            } else {
                recentCon.innerHTML = '<div class="empty-state">No recent results</div>';
            }

            const upCon = document.getElementById('upcoming-container');
            if(Object.keys(futureGroups).length > 0){
                renderGroups(futureGroups, upCon, true); // soonest first
            } else {
                upCon.innerHTML = '<div class="empty-state">No upcoming fixtures found</div>';
            }

            document.getElementById('page-meta').textContent =
                'Updated ' + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
        }

        load();
        setInterval(load, 5*60*1000);
    })();
    </script>
</body>
</html>
