<!-- Mobile: Kill Google anchor/popup/bottom ads site-wide -->
<style>
@media (max-width: 600px) {
    ins.adsbygoogle[data-anchor-shown],
    ins.adsbygoogle[data-anchor-status],
    ins.adsbygoogle[data-anchor-shown="true"],
    ins.adsbygoogle[data-ad-status="filled"][style*="position: fixed"],
    div[id^="aswift_"][style*="position: fixed"],
    iframe[id^="aswift_"][style*="position: fixed"],
    div[id^="google_ads_iframe"][style*="position: fixed"],
    div[style*="position: fixed"][style*="z-index: 2147"],
    div[style*="position: fixed"][style*="bottom: 0px"] {
        display: none !important;
        height: 0 !important;
        max-height: 0 !important;
        visibility: hidden !important;
        overflow: hidden !important;
        pointer-events: none !important;
    }
}
.nyt-mobile-section {
    padding: 14px 24px 6px;
    font-family: 'DM Sans', -apple-system, sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: rgba(240,236,228,0.3);
    pointer-events: none;
}
</style>
<script>
(function(){
    if(window.innerWidth>600)return;
    function k(){
        document.querySelectorAll('ins.adsbygoogle[data-anchor-shown],ins.adsbygoogle[data-anchor-status]').forEach(function(e){
            e.style.setProperty('display','none','important');
            e.style.setProperty('height','0','important');
            e.style.setProperty('max-height','0','important');
            e.style.setProperty('visibility','hidden','important');
            e.style.setProperty('overflow','hidden','important');
        });
    }
    new MutationObserver(function(m){
        for(var i=0;i<m.length;i++){var a=m[i].addedNodes;for(var j=0;j<a.length;j++){if(a[j].nodeType===1){k();return;}}}
    }).observe(document.documentElement,{childList:true,subtree:true});
    k();
})();
</script>

<script>
function toggleMobileMenu() {
    const sidebar = document.getElementById('mobile-sidebar');
    const overlay = document.getElementById('mobile-sidebar-overlay');
    const isOpen = sidebar.classList.contains('active');
    if (isOpen) {
        sidebar.classList.remove('active');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
    } else {
        sidebar.classList.add('active');
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
}
(function() {
    let touchStartX = 0;
    const sidebar = document.getElementById('mobile-sidebar');
    if (!sidebar) return;
    sidebar.addEventListener('touchstart', function(e) { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
    sidebar.addEventListener('touchend', function(e) {
        if (touchStartX - e.changedTouches[0].screenX > 60) toggleMobileMenu();
    }, { passive: true });
})();
</script>
